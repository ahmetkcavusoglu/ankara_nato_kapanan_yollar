<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NATO 2026 – Ankara Kapalı Yollar</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#dc2626;--blue:#2563eb;--bg:#f8f9fa;--surface:#fff;--border:#e5e7eb;--text:#111827;--muted:#6b7280}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

header{background:#0f172a;color:#fff;padding:.6rem 1rem;display:flex;align-items:center;gap:.7rem;flex-shrink:0;z-index:1000}
.logo{background:var(--red);color:#fff;font-size:.56rem;font-weight:700;letter-spacing:.07em;padding:.2rem .42rem;border-radius:4px;text-transform:uppercase;flex-shrink:0;line-height:1.3;text-align:center}
header h1{font-size:.88rem;font-weight:600;flex:1;line-height:1.2}
header p{font-size:.62rem;color:#94a3b8;margin-top:1px}

#panel{flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);padding:.7rem 1rem;z-index:900;position:relative}
.search-wrap{position:relative}
#addr-input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:.55rem .75rem;font-size:.88rem;outline:none}
#addr-input:focus{border-color:var(--blue)}

#suggest{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.12);z-index:1001;display:none;max-height:240px;overflow-y:auto}
.sug-item{padding:.55rem .75rem;font-size:.82rem;cursor:pointer;border-bottom:1px solid #f1f1f1;line-height:1.35}
.sug-item:last-child{border-bottom:none}
.sug-item:hover,.sug-item.active{background:#f0f6ff}
.sug-item .main{font-weight:600;color:var(--text)}
.sug-item .sub{font-size:.72rem;color:var(--muted);margin-top:1px}
.sug-loading{padding:.55rem .75rem;font-size:.78rem;color:var(--muted)}

#result-box{display:none;margin-top:.55rem;border-radius:8px;padding:.55rem .8rem;font-size:.8rem;font-weight:500;line-height:1.45}
.result-safe{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0}
.result-closed{background:#fee2e2;color:#b91c1c;border:1px solid #fecaca}
.result-warn{background:#fef9c3;color:#854d0e;border:1px solid #fef08a}

#map{flex:1;min-height:0;background:#e8eaf0}

.leaflet-popup-content-wrapper{border-radius:10px;border:1px solid var(--border)}
.leaflet-popup-content{margin:10px 13px;font-size:.82rem;line-height:1.5}
.pop-title{font-weight:700;font-size:.88rem;margin-bottom:3px}
.pop-tag{display:inline-block;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:.13rem .45rem;border-radius:4px;margin-top:5px;background:#fee2e2;color:#b91c1c}

#status{position:absolute;bottom:1.3rem;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.96);border:1px solid var(--border);color:var(--muted);font-size:.75rem;padding:.45rem 1rem;border-radius:20px;z-index:999;display:none;box-shadow:0 2px 12px rgba(0,0,0,.08)}

.src{font-size:.6rem;color:#9ca3af;padding:.4rem 1rem 0;line-height:1.3}
</style>
</head>
<body>

<header>
  <span class="logo">NATO<br>2026</span>
  <div>
    <h1>Ankara Kapalı Yollar Haritası</h1>
    <p>36. NATO Zirvesi · 28 Haziran – 10 Temmuz 2026</p>
  </div>
</header>

<div id="panel">
  <div class="search-wrap">
    <input id="addr-input" type="text" placeholder="Adres veya cadde arayın… örn: Emek, Cinnah Caddesi" autocomplete="off"/>
    <div id="suggest"></div>
  </div>
  <div id="result-box"></div>
  <div class="src">Kaynak: "Nato Zirvesi Kapalı Caddeler" canlı harita verisi · Adres arama: OpenStreetMap</div>
</div>

<div id="map"></div>
<div id="status">Harita verileri yükleniyor…</div>

<script>
const map=L.map('map',{center:[39.9150,32.8100],zoom:12,zoomControl:true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; CARTO &copy; OpenStreetMap',subdomains:'abcd',maxZoom:19}).addTo(map);

const roadLayer=L.layerGroup().addTo(map);
const status=document.getElementById('status');
status.style.display='block';

// ═══ KML CANLI VERİ ══════════════════════════════════════════════════════════
const KML_URL='https://www.google.com/maps/d/u/0/kml?mid=1N4D1di4x0Qm2eWkeKTHQMWso3Rvn4VY&forcekml=1';
const PROXY='https://api.allorigins.win/raw?url=';

function parseCoords(str){return str.trim().split(/\s+/).map(c=>{const[ln,la]=c.split(',').map(Number);return[la,ln];});}

fetch(PROXY+encodeURIComponent(KML_URL))
  .then(r=>{if(!r.ok)throw new Error();return r.text();})
  .then(kml=>{
    const doc=new DOMParser().parseFromString(kml,'text/xml');
    const pms=doc.querySelectorAll('Placemark');
    if(!pms.length)throw new Error('boş');
    const all=[];
    pms.forEach(pm=>{
      const name=pm.querySelector('name')?.textContent||'Kapalı Bölge';
      const desc=pm.querySelector('description')?.textContent||'';
      const lc=pm.querySelector('LineString coordinates');
      if(lc){const coords=parseCoords(lc.textContent);
        const pl=L.polyline(coords,{color:'#dc2626',weight:5,opacity:.85,dashArray:'8 4'})
          .bindPopup(`<div class="pop-title">${name}</div>${desc?`<div style="font-size:.76rem;color:#6b7280;margin-top:2px">${desc}</div>`:''}<span class="pop-tag">⛔ Trafiğe Kapalı</span>`)
          .addTo(roadLayer);
        all.push(pl);}
      const pc=pm.querySelector('Point coordinates');
      if(pc){const[ln,la]=pc.textContent.trim().split(',').map(Number);
        const mk=L.circleMarker([la,ln],{radius:7,fillColor:'#dc2626',color:'#fff',weight:2,fillOpacity:.9})
          .bindPopup(`<div class="pop-title">${name}</div>${desc?`<div style="font-size:.76rem;color:#6b7280;margin-top:2px">${desc}</div>`:''}`)
          .addTo(roadLayer);
        all.push(mk);}
      const poly=pm.querySelector('Polygon outerBoundaryIs LinearRing coordinates');
      if(poly){const coords=parseCoords(poly.textContent);
        const pg=L.polygon(coords,{color:'#dc2626',fillColor:'#dc2626',fillOpacity:.1,weight:2})
          .bindPopup(`<div class="pop-title">${name}</div>${desc?`<div style="font-size:.76rem;color:#6b7280;margin-top:2px">${desc}</div>`:''}`)
          .addTo(roadLayer);
        all.push(pg);}
    });
    if(all.length){const g=L.featureGroup(all);try{map.fitBounds(g.getBounds(),{padding:[40,40]});}catch(e){}}
    status.style.display='none';
  })
  .catch(()=>{
    status.textContent='Veri yüklenemedi — alternatif görünüm açılıyor…';
    setTimeout(()=>{document.getElementById('map').innerHTML=`<iframe src="https://www.google.com/maps/d/u/0/embed?mid=1N4D1di4x0Qm2eWkeKTHQMWso3Rvn4VY&ll=39.932090376723096,32.62557501490355&z=13" style="width:100%;height:100%;border:none"></iframe>`;status.style.display='none';},1200);
  });

// ═══ ADRES ARAMA — ÖNERİLİ AUTOCOMPLETE ══════════════════════════════════════
const input=document.getElementById('addr-input');
const sugBox=document.getElementById('suggest');
let debounce,activeIdx=-1,suggestions=[];

input.addEventListener('input',()=>{
  const q=input.value.trim();
  document.getElementById('result-box').style.display='none';
  clearTimeout(debounce);
  if(q.length<2){sugBox.style.display='none';return;}
  sugBox.innerHTML='<div class="sug-loading">Aranıyor…</div>';
  sugBox.style.display='block';
  debounce=setTimeout(()=>fetchSuggestions(q),300);
});

async function fetchSuggestions(q){
  try{
    // Ankara'ya viewbox ile sınırla (sol,üst,sağ,alt) + bounded
    const vb='32.5,40.1,33.0,39.7';
    const url=`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&countrycodes=tr&viewbox=${vb}&bounded=1&addressdetails=1&accept-language=tr`;
    const r=await fetch(url);
    suggestions=await r.json();
    renderSuggestions();
  }catch(e){sugBox.innerHTML='<div class="sug-loading">Arama yapılamadı</div>';}
}

function renderSuggestions(){
  activeIdx=-1;
  if(!suggestions.length){sugBox.innerHTML='<div class="sug-loading">Sonuç bulunamadı</div>';return;}
  sugBox.innerHTML=suggestions.map((s,i)=>{
    const parts=s.display_name.split(',');
    const main=parts[0].trim();
    const sub=parts.slice(1,4).join(',').trim();
    return `<div class="sug-item" data-i="${i}"><div class="main">${main}</div><div class="sub">${sub}</div></div>`;
  }).join('');
  sugBox.querySelectorAll('.sug-item').forEach(el=>{
    el.addEventListener('click',()=>selectSuggestion(+el.dataset.i));
  });
}

function selectSuggestion(i){
  const s=suggestions[i];
  if(!s)return;
  input.value=s.display_name.split(',')[0].trim();
  sugBox.style.display='none';
  const lat=+s.lat,lng=+s.lon;
  if(window._am)window._am.remove();
  window._am=L.marker([lat,lng]).addTo(map);
  map.setView([lat,lng],15);
  checkProximity(lat,lng,s.display_name);
}

// Klavye navigasyonu
input.addEventListener('keydown',e=>{
  const items=sugBox.querySelectorAll('.sug-item');
  if(!items.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();activeIdx=Math.min(activeIdx+1,items.length-1);updateActive(items);}
  else if(e.key==='ArrowUp'){e.preventDefault();activeIdx=Math.max(activeIdx-1,0);updateActive(items);}
  else if(e.key==='Enter'){e.preventDefault();selectSuggestion(activeIdx>=0?activeIdx:0);}
  else if(e.key==='Escape'){sugBox.style.display='none';}
});
function updateActive(items){items.forEach((el,i)=>el.classList.toggle('active',i===activeIdx));if(items[activeIdx])items[activeIdx].scrollIntoView({block:'nearest'});}

// Dışarı tıklayınca kapat
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))sugBox.style.display='none';});

// Kapalı yola yakınlık kontrolü
function checkProximity(lat,lng,label){
  const box=document.getElementById('result-box');
  box.style.display='block';
  let min=Infinity;
  roadLayer.eachLayer(l=>{
    let pts=[];
    if(l.getLatLngs){const ll=l.getLatLngs();pts=Array.isArray(ll[0])?ll.flat():ll;}
    else if(l.getLatLng){pts=[l.getLatLng()];}
    pts.forEach(p=>{const d=Math.sqrt((p.lat-lat)**2+(p.lng-lng)**2)*111000;if(d<min)min=d;});
  });
  if(min===Infinity){box.className='result-warn';box.innerHTML=`📍 Konum haritada işaretlendi.<br><small style="font-weight:400">Kapalı yol verisi henüz yüklenmedi</small>`;return;}
  if(min<300){box.className='result-closed';box.innerHTML=`⛔ Bu konum kapalı bölgede veya çok yakın.<br><small style="font-weight:400">En yakın kapalı yola ${Math.round(min)} m</small>`;}
  else if(min<800){box.className='result-warn';box.innerHTML=`⚠️ Kapalı yola yakın, dikkatli olun.<br><small style="font-weight:400">${Math.round(min)} m uzakta</small>`;}
  else{box.className='result-safe';box.innerHTML=`✅ Bu konum kapalı bölge dışında.<br><small style="font-weight:400">En yakın kapalı yol ${Math.round(min)} m uzakta</small>`;}
}
</script>
</body>
</html>
