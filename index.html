<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harita</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    header svg {
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      gap: 1rem;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }

    .map-wrapper {
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      flex: 1;
      min-height: 500px;
    }

    .map-wrapper iframe {
      width: 100%;
      height: 100%;
      min-height: 500px;
      border: none;
      display: block;
    }

    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.8rem;
      color: #888;
    }

    @media (max-width: 600px) {
      main { padding: 1rem; }
      .map-wrapper { min-height: 360px; }
      .map-wrapper iframe { min-height: 360px; }
    }
  </style>
</head>
<body>

  <header>
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#e8c44a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
      <circle cx="12" cy="10" r="3"/>
    </svg>
    <h1>Harita</h1>
  </header>

  <main>
    <div class="map-wrapper">
      <iframe
        src="https://www.google.com/maps/d/u/0/embed?mid=1N4D1di4x0Qm2eWkeKTHQMWso3Rvn4VY&ll=39.932090376723096,32.62557501490355&z=13"
        allowfullscreen
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        title="Harita">
      </iframe>
    </div>
  </main>

  <footer>
    Google My Maps · Harita verisi © Google
  </footer>

</body>
</html>
