<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NATO Zirvesi – Kapalı Caddeler</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #0f1117;
      border-bottom: 1px solid #1e2535;
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-shrink: 0;
      z-index: 1000;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .badge {
      background: #dc2626;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #f1f5f9;
      letter-spacing: 0.01em;
    }

    header p {
      font-size: 0.72rem;
      color: #64748b;
      margin-top: 0.1rem;
    }

    .legend {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.72rem;
      color: #94a3b8;
    }

    .legend-line {
      width: 22px;
      height: 3px;
      border-radius: 2px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    #map {
      flex: 1;
      background: #1a1f2e;
    }

    #status {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15,17,23,0.92);
      border: 1px solid #1e2535;
      color: #94a3b8;
      font-size: 0.75rem;
      padding: 0.45rem 1rem;
      border-radius: 20px;
      z-index: 999;
      display: none;
      backdrop-filter: blur(6px);
    }

    .leaflet-popup-content-wrapper {
      background: #1e2535;
      color: #e2e8f0;
      border: 1px solid #2d3748;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .leaflet-popup-tip {
      background: #1e2535;
    }

    .leaflet-popup-content {
      margin: 10px 14px;
      font-size: 0.82rem;
      line-height: 1.5;
    }

    .popup-title {
      font-weight: 600;
      font-size: 0.88rem;
      color: #f1f5f9;
      margin-bottom: 4px;
    }

    .popup-desc {
      color: #94a3b8;
      font-size: 0.78rem;
    }

    .popup-closed {
      display: inline-block;
      margin-top: 6px;
      background: #dc2626;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
    }

    @media (max-width: 600px) {
      .legend { display: none; }
      header h1 { font-size: 0.85rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="badge">NATO 2025</span>
    <div>
      <h1>Kapalı Caddeler</h1>
      <p>Ankara · Zirve dönemi trafik kısıtlamaları</p>
    </div>
  </div>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-line" style="background:#dc2626;"></div>
      Kapalı yol
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#f97316;"></div>
      Kontrol noktası
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#3b82f6;"></div>
      Konum
    </div>
  </div>
</header>

<div id="map"></div>
<div id="status">Harita verileri yükleniyor…</div>

<script>
// --- Harita başlat ---
const map = L.map('map', {
  center: [39.9321, 32.6256],
  zoom: 13,
  zoomControl: true,
  attributionControl: true
});

// Dark tile layer (CartoDB Dark Matter)
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a> | &copy; <a href="https://openstreetmap.org">OpenStreetMap</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// --- KML yükleyici (omnivore / fetch+parse) ---
const KML_URL = 'https://www.google.com/maps/d/u/0/kml?mid=1N4D1di4x0Qm2eWkeKTHQMWso3Rvn4VY&forcekml=1';
const PROXY   = 'https://api.allorigins.win/raw?url=';

const statusEl = document.getElementById('status');
statusEl.style.display = 'block';

// Stil fonksiyonları
function styleForFeature(feature) {
  const name = (feature.properties?.name || '').toLowerCase();
  const desc = (feature.properties?.description || '').toLowerCase();
  // Çizgi (polyline) — kapalı yol
  if (feature.geometry?.type === 'LineString' || feature.geometry?.type === 'MultiLineString') {
    return { color: '#dc2626', weight: 4, opacity: 0.9, dashArray: '8 4' };
  }
  return { color: '#f97316', weight: 3, opacity: 0.85 };
}

function pointToLayer(feature, latlng) {
  const name = (feature.properties?.name || '').toLowerCase();
  // Renk seçimi
  let color = '#3b82f6';
  if (name.includes('kapat') || name.includes('kapali') || name.includes('kapalı')) color = '#dc2626';
  else if (name.includes('kontrol') || name.includes('barikat') || name.includes('nokta')) color = '#f97316';

  return L.circleMarker(latlng, {
    radius: 7,
    fillColor: color,
    color: '#fff',
    weight: 1.5,
    opacity: 1,
    fillOpacity: 0.9
  });
}

function onEachFeature(feature, layer) {
  const name = feature.properties?.name || '';
  const desc = feature.properties?.description || '';
  if (name || desc) {
    const isLine = feature.geometry?.type?.includes('Line');
    layer.bindPopup(`
      <div class="popup-title">${name || 'Kapalı Bölge'}</div>
      ${desc ? `<div class="popup-desc">${desc}</div>` : ''}
      ${isLine ? '<span class="popup-closed">⛔ Trafiğe Kapalı</span>' : ''}
    `);
  }
}

// KML'i parse eden basit fonksiyon (DOMParser)
function parseKML(kmlText) {
  const parser = new DOMParser();
  const kmlDoc = parser.parseFromString(kmlText, 'text/xml');
  const features = [];

  function getCoords(coordStr) {
    return coordStr.trim().split(/\s+/).map(c => {
      const [lng, lat] = c.split(',').map(Number);
      return [lat, lng];
    });
  }

  const placemarks = kmlDoc.querySelectorAll('Placemark');
  placemarks.forEach(pm => {
    const name = pm.querySelector('name')?.textContent || '';
    const desc = pm.querySelector('description')?.textContent || '';

    // LineString
    const lineCoordEl = pm.querySelector('LineString coordinates');
    if (lineCoordEl) {
      const coords = getCoords(lineCoordEl.textContent);
      features.push({
        type: 'Feature',
        geometry: { type: 'LineString', coordinates: coords.map(([lat,lng]) => [lng,lat]) },
        properties: { name, description: desc }
      });
    }

    // Point
    const pointCoordEl = pm.querySelector('Point coordinates');
    if (pointCoordEl) {
      const [lng, lat] = pointCoordEl.textContent.trim().split(',').map(Number);
      features.push({
        type: 'Feature',
        geometry: { type: 'Point', coordinates: [lng, lat] },
        properties: { name, description: desc }
      });
    }

    // Polygon
    const polyCoordEl = pm.querySelector('Polygon outerBoundaryIs LinearRing coordinates');
    if (polyCoordEl) {
      const coords = getCoords(polyCoordEl.textContent);
      features.push({
        type: 'Feature',
        geometry: { type: 'Polygon', coordinates: [coords.map(([lat,lng]) => [lng,lat])] },
        properties: { name, description: desc }
      });
    }
  });

  return { type: 'FeatureCollection', features };
}

function renderGeoJSON(geojson) {
  const layer = L.geoJSON(geojson, {
    style: styleForFeature,
    pointToLayer: pointToLayer,
    onEachFeature: onEachFeature
  }).addTo(map);

  if (layer.getLayers().length > 0) {
    try { map.fitBounds(layer.getBounds(), { padding: [40, 40] }); } catch(e) {}
  }

  statusEl.style.display = 'none';
}

// CORS proxy üzerinden KML fetch
fetch(PROXY + encodeURIComponent(KML_URL))
  .then(r => {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.text();
  })
  .then(kmlText => {
    const geojson = parseKML(kmlText);
    if (geojson.features.length === 0) throw new Error('Veri bulunamadı');
    renderGeoJSON(geojson);
  })
  .catch(err => {
    console.warn('Proxy hatası:', err);
    // Fallback: doğrudan Google embed iframe göster
    statusEl.textContent = 'Harita verileri yüklenemedi — alternatif görünüm açılıyor…';
    setTimeout(() => {
      document.getElementById('map').innerHTML = `
        <iframe
          src="https://www.google.com/maps/d/u/0/embed?mid=1N4D1di4x0Qm2eWkeKTHQMWso3Rvn4VY&ll=39.932090376723096,32.62557501490355&z=13"
          style="width:100%;height:100%;border:none;"
          allowfullscreen loading="lazy">
        </iframe>`;
      statusEl.style.display = 'none';
    }, 1200);
  });
</script>

</body>
</html>
